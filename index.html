<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <title>被找到了</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            background: #111;
            color: white;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 28px;
        }

        img {
            width: 200px;
            height: auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <h1>You solved the puzzle！</h1>
    <img src="zozo.jpg" alt="Rotating Image" />
    <h1>请立刻联系小天以获得您的额外奖励！</h1>
</body>

</html>
