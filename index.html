<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            background: #111;
            color: white;
            cursor: default;
            user-select: none;
        }

        h1 {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            margin: 0;
            font-size: 22px;
            text-align: center;
            pointer-events: none;
            z-index: 1;
        }

        #arena {
            position: fixed;
            inset: 0;
            top: 60px;
        }

        #logoWrap {
            position: absolute;
            display: inline-block;
            pointer-events: none;
            will-change: transform;
        }

        #logoWrap.dragging {
            pointer-events: auto;
            cursor: grab;
        }

        #logoWrap:active {
            cursor: grabbing;
        }

        #logoWrap.hit::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(200, 60, 60, 0.4);
            pointer-events: none;
            border-radius: 2px;
            animation: hitFlash 0.2s ease-out;
        }

        @keyframes hitFlash {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        #logo {
            width: 200px;
            height: auto;
            display: block;
            pointer-events: none;
        }

        .projectile {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f55;
            pointer-events: none;
            left: 0;
            top: 0;
        }

        .enemy {
            position: absolute;
            width: 80px;
            height: auto;
            pointer-events: none;
            left: 0;
            top: 0;
        }
        .enemy img {
            display: block;
            width: 100%;
            height: auto;
        }
    </style>
</head>

<body>
    <h1><span id="health">Health: 100</span></h1>
    <h2><span id="score">0</span></h2>
    <div id="arena">
        <div id="projectiles"></div>
        <div id="enemies"></div>
        <div id="logoWrap">
            <img id="logo" src=".\assets\zozo.jpg" alt="Zozo" draggable="false" />
        </div>
    </div>
    <audio id="hitSnd" preload="auto"></audio>
    <audio id="shootSnd" preload="auto"></audio>

    <script>
        (function () {
            const arena = document.getElementById('arena');
            const logoWrap = document.getElementById('logoWrap');
            const logo = document.getElementById('logo');
            const projectilesEl = document.getElementById('projectiles');
            const enemiesEl = document.getElementById('enemies');
            const hitSnd = document.getElementById('hitSnd');
            const shootSnd = document.getElementById('shootSnd');
            const healthEl = document.getElementById('health');
            const scoreEl = document.getElementById('score');

            const arenaRect = () => arena.getBoundingClientRect();

            hitSnd.src = 'assets/collision.mp3';
            shootSnd.src = 'assets/shooting.mp3';

            //Configs
            let x = 0, y = 0;
            let vx = 0, vy = 0;
            const friction = 0.994;
            const bounce = 0.92;
            const minSpeed = 0.08;
            const moveSpeed = 4;
            const projectileSpeed = 14;

            const keys = { w: false, a: false, s: false, d: false };
            const projectiles = [];
            const enemies = [];
            const enemySpeed = 1.2;
            let enemySpawnIntervalMs = 1500;
            let lastEnemySpawn = 0;
            let health = 100;
            let score = 0;
            // --- Dragging (commented out) ---
            // let isDragging = false;
            // let dragStartX = 0, dragStartY = 0;
            // let dragStartLogoX = 0, dragStartLogoY = 0;
            // const dragHistory = [];
            // const dragHistoryMax = 8;
            // const throwStrength = 0.1;
            let hitTimeout = null;

            function flashHit() {
                logoWrap.classList.add('hit');
                health -= 25;
                healthEl.innerText = `Health: ${health}`;
                if (hitTimeout) clearTimeout(hitTimeout);
                hitTimeout = setTimeout(function () {
                    logoWrap.classList.remove('hit');
                    hitTimeout = null;
                }, 200);
                if (hitSnd.src) {
                    hitSnd.currentTime = 0;
                    hitSnd.play().catch(function () {});
                }
                if (health <= 0) {
                    gameOver();
                }
            }

            function gameOver() {
                window.location.reload()
            }
            function getLogoSize() {
                return { w: logo.offsetWidth, h: logo.offsetHeight };
            }

            function clampPosition() {
                const r = arenaRect();
                const { w, h } = getLogoSize();
                const pad = 2;
                const left = pad;
                const right = r.width - w - pad;
                const top = pad;
                const bottom = r.height - h - pad;

                if (x < left) {
                    x = left;
                    if (vx < 0) {
                        console.log('Hit border: left');
                        flashHit();
                    }
                    vx = -vx * bounce;
                }
                if (x > right) {
                    x = right;
                    if (vx > 0) {
                        console.log('Hit border: right');
                        flashHit();
                    }
                    vx = -vx * bounce;
                }
                if (y < top) {
                    y = top;
                    if (vy < 0) {
                        console.log('Hit border: top');
                        flashHit();
                    }
                    vy = -vy * bounce;
                }
                if (y > bottom) {
                    y = bottom;
                    if (vy > 0) {
                        console.log('Hit border: bottom');
                        flashHit();
                    }
                    vy = -vy * bounce;
                }
            }

            function applyFriction() {
                const s = Math.hypot(vx, vy);
                if (s < minSpeed) {
                    vx = 0;
                    vy = 0;
                    return;
                }
                vx *= friction;
                vy *= friction;
            }

            function setPosition(px, py) {
                x = px;
                y = py;
                logoWrap.style.left = px + 'px';
                logoWrap.style.top = py + 'px';
            }

            function initPosition() {
                const r = arenaRect();
                const { w, h } = getLogoSize();
                if (!w || !h) return;
                x = (r.width - w) / 2;
                y = (r.height - h) / 2;
                setPosition(x, y);
            }

            function spawnEnemy() {
                const r = arenaRect();
                const enemyW = 80;
                const enemyH = 80;
                const side = Math.floor(Math.random() * 4);
                let ex, ey;
                if (side === 0) {
                    ex = Math.random() * (r.width - enemyW);
                    ey = -enemyH;
                } else if (side === 1) {
                    ex = r.width;
                    ey = Math.random() * (r.height - enemyH);
                } else if (side === 2) {
                    ex = Math.random() * (r.width - enemyW);
                    ey = r.height;
                } else {
                    ex = -enemyW;
                    ey = Math.random() * (r.height - enemyH);
                }
                const el = document.createElement('div');
                el.className = 'enemy';
                const img = document.createElement('img');
                img.src = 'assets/zozoEnemy.jpg';
                img.alt = 'Enemy';
                el.appendChild(img);
                enemiesEl.appendChild(el);
                el.style.left = ex + 'px';
                el.style.top = ey + 'px';
                enemies.push({ x: ex, y: ey, w: enemyW, h: enemyH, el: el });
            }

            function rectsOverlap(a, b) {
                return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
            }

            function tick() {
                // WASD movement
                if (keys.w) vy -= moveSpeed * 0.15;
                if (keys.s) vy += moveSpeed * 0.15;
                if (keys.a) vx -= moveSpeed * 0.15;
                if (keys.d) vx += moveSpeed * 0.15;

                applyFriction();
                x += vx;
                y += vy;
                clampPosition();
                setPosition(x, y);

                const r = arenaRect();
                const { w: logoW, h: logoH } = getLogoSize();
                const logoRect = { x: x, y: y, w: logoW, h: logoH };

                // Spawn enemies from borders
                const now = Date.now();
                if (now - lastEnemySpawn >= enemySpawnIntervalMs) {
                    lastEnemySpawn = now;
                    spawnEnemy();
                    enemySpawnIntervalMs -= 10;
                }

                // Update enemies: move toward logo
                const logoCx = x + logoW / 2;
                const logoCy = y + logoH / 2;
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const e = enemies[i];
                    const ecx = e.x + e.w / 2;
                    const ecy = e.y + e.h / 2;
                    const dx = logoCx - ecx;
                    const dy = logoCy - ecy;
                    const len = Math.hypot(dx, dy) || 1;
                    e.x += (dx / len) * enemySpeed;
                    e.y += (dy / len) * enemySpeed;
                    e.el.style.left = e.x + 'px';
                    e.el.style.top = e.y + 'px';

                    if (rectsOverlap(e, logoRect)) {
                        flashHit();
                        e.el.remove();
                        enemies.splice(i, 1);
                    }
                }

                // Update projectiles & projectile vs enemy
                for (let i = projectiles.length - 1; i >= 0; i--) {
                    const p = projectiles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.el.style.left = p.x + 'px';
                    p.el.style.top = p.y + 'px';

                    const pRect = { x: p.x, y: p.y, w: 10, h: 10 };
                    let hit = false;
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        const e = enemies[j];
                        if (rectsOverlap(pRect, e)) {
                            p.el.remove();
                            projectiles.splice(i, 1);
                            e.el.remove();
                            enemies.splice(j, 1);
                            score += 10;
                            scoreEl.innerText = `Score: ${score} pts`;
                            hit = true;
                            break;
                        }
                    }
                    if (hit) continue;
                    if (p.x < -20 || p.x > r.width + 20 || p.y < -20 || p.y > r.height + 20) {
                        p.el.remove();
                        projectiles.splice(i, 1);
                    }
                }

                requestAnimationFrame(tick);
            }

            arena.addEventListener('mousedown', function (e) {
                if (e.button !== 0) return;
                e.preventDefault();
                const r = arenaRect();
                const mx = e.clientX - r.left;
                const my = e.clientY - r.top;
                const { w, h } = getLogoSize();
                const cx = x + w / 2;
                const cy = y + h / 2;
                const dx = mx - cx;
                const dy = my - cy;
                const len = Math.hypot(dx, dy) || 1;
                const pvx = (dx / len) * projectileSpeed;
                const pvy = (dy / len) * projectileSpeed;
                const el = document.createElement('div');
                el.className = 'projectile';
                projectilesEl.appendChild(el);
                projectiles.push({ x: cx - 5, y: cy - 5, vx: pvx, vy: pvy, el: el });
                if (shootSnd.src) {
                    shootSnd.currentTime = 0;
                    // shootSnd.play().catch(function () {});
                }
            });

            // --- Dragging: mousemove and mouseup commented out ---
            // window.addEventListener('mousemove', function (e) {
            //     if (!isDragging) return;
            //     ...
            // });
            // window.addEventListener('mouseup', function (e) {
            //     if (!isDragging) return;
            //     ...
            // });

            window.addEventListener('keydown', function (e) {
                const k = e.key.toLowerCase();
                if (k === 'w' || k === 'a' || k === 's' || k === 'd') e.preventDefault();
                if (k === 'w') keys.w = true;
                if (k === 'a') keys.a = true;
                if (k === 's') keys.s = true;
                if (k === 'd') keys.d = true;
            });
            window.addEventListener('keyup', function (e) {
                const k = e.key.toLowerCase();
                if (k === 'w') keys.w = false;
                if (k === 'a') keys.a = false;
                if (k === 's') keys.s = false;
                if (k === 'd') keys.d = false;
            });

            window.addEventListener('resize', function () {
                const r = arenaRect();
                const { w, h } = getLogoSize();
                const pad = 2;
                const maxX = Math.max(0, r.width - w - pad);
                const maxY = Math.max(0, r.height - h - pad);
                x = Math.max(pad, Math.min(maxX, x));
                y = Math.max(pad, Math.min(maxY, y));
                setPosition(x, y);
            });

            logo.addEventListener('dragstart', function (e) {
                e.preventDefault();
            });

            if (logo.complete && logo.naturalWidth) {
                initPosition();
            } else {
                logo.addEventListener('load', initPosition);
            }
            requestAnimationFrame(tick);
        })();
    </script>
</body>

</html>
