<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            background: #111;
            color: white;
            cursor: default;
            user-select: none;
        }

        h1 {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            margin: 0;
            font-size: 22px;
            text-align: center;
            pointer-events: none;
            z-index: 1;
        }

        #arena {
            position: fixed;
            inset: 0;
            top: 60px;
        }

        #logoWrap {
            position: absolute;
            display: inline-block;
            pointer-events: none;
            will-change: transform;
        }

        #logoWrap.dragging {
            pointer-events: auto;
            cursor: grab;
        }

        #logoWrap:active {
            cursor: grabbing;
        }

        #logoWrap.hit::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(200, 60, 60, 0.4);
            pointer-events: none;
            border-radius: 2px;
            animation: hitFlash 0.2s ease-out;
        }

        @keyframes hitFlash {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        #logo {
            width: 200px;
            height: auto;
            display: block;
            pointer-events: none;
        }

        .projectile {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f55;
            pointer-events: none;
            left: 0;
            top: 0;
        }
    </style>
</head>

<body>
    <div id="arena">
        <div id="projectiles"></div>
        <div id="logoWrap">
            <img id="logo" src=".\assets\zozo.jpg" alt="Zozo" draggable="false" />
        </div>
    </div>
    <audio id="hitSnd" preload="auto"></audio>
    <audio id="shootSnd" preload="auto"></audio>

    <script>
        (function () {
            const arena = document.getElementById('arena');
            const logoWrap = document.getElementById('logoWrap');
            const logo = document.getElementById('logo');
            const projectilesEl = document.getElementById('projectiles');
            const hitSnd = document.getElementById('hitSnd');
            const shootSnd = document.getElementById('shootSnd');
            const arenaRect = () => arena.getBoundingClientRect();

            hitSnd.src = 'assets/collision.mp3';
            shootSnd.src = 'assets/shooting.mp3';

            //Configs
            let x = 0, y = 0;
            let vx = 0, vy = 0;
            const friction = 0.994;
            const bounce = 0.92;
            const minSpeed = 0.08;
            const moveSpeed = 4;
            const projectileSpeed = 14;

            const keys = { w: false, a: false, s: false, d: false };
            const projectiles = [];

            // --- Dragging (commented out) ---
            // let isDragging = false;
            // let dragStartX = 0, dragStartY = 0;
            // let dragStartLogoX = 0, dragStartLogoY = 0;
            // const dragHistory = [];
            // const dragHistoryMax = 8;
            // const throwStrength = 0.1;
            let hitTimeout = null;

            function flashHit() {
                logoWrap.classList.add('hit');
                if (hitTimeout) clearTimeout(hitTimeout);
                hitTimeout = setTimeout(function () {
                    logoWrap.classList.remove('hit');
                    hitTimeout = null;
                }, 200);
                if (hitSnd.src) {
                    hitSnd.currentTime = 0;
                    hitSnd.play().catch(function () {});
                }
            }

            function getLogoSize() {
                return { w: logo.offsetWidth, h: logo.offsetHeight };
            }

            function clampPosition() {
                const r = arenaRect();
                const { w, h } = getLogoSize();
                const pad = 2;
                const left = pad;
                const right = r.width - w - pad;
                const top = pad;
                const bottom = r.height - h - pad;

                if (x < left) {
                    x = left;
                    if (vx < 0) {
                        console.log('Hit border: left');
                        flashHit();
                    }
                    vx = -vx * bounce;
                }
                if (x > right) {
                    x = right;
                    if (vx > 0) {
                        console.log('Hit border: right');
                        flashHit();
                    }
                    vx = -vx * bounce;
                }
                if (y < top) {
                    y = top;
                    if (vy < 0) {
                        console.log('Hit border: top');
                        flashHit();
                    }
                    vy = -vy * bounce;
                }
                if (y > bottom) {
                    y = bottom;
                    if (vy > 0) {
                        console.log('Hit border: bottom');
                        flashHit();
                    }
                    vy = -vy * bounce;
                }
            }

            function applyFriction() {
                const s = Math.hypot(vx, vy);
                if (s < minSpeed) {
                    vx = 0;
                    vy = 0;
                    return;
                }
                vx *= friction;
                vy *= friction;
            }

            function setPosition(px, py) {
                x = px;
                y = py;
                logoWrap.style.left = px + 'px';
                logoWrap.style.top = py + 'px';
            }

            function initPosition() {
                const r = arenaRect();
                const { w, h } = getLogoSize();
                if (!w || !h) return;
                x = (r.width - w) / 2;
                y = (r.height - h) / 2;
                setPosition(x, y);
            }

            function tick() {
                // WASD movement
                if (keys.w) vy -= moveSpeed * 0.15;
                if (keys.s) vy += moveSpeed * 0.15;
                if (keys.a) vx -= moveSpeed * 0.15;
                if (keys.d) vx += moveSpeed * 0.15;

                applyFriction();
                x += vx;
                y += vy;
                clampPosition();
                setPosition(x, y);

                // Update projectiles
                const r = arenaRect();
                for (let i = projectiles.length - 1; i >= 0; i--) {
                    const p = projectiles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.el.style.left = p.x + 'px';
                    p.el.style.top = p.y + 'px';
                    if (p.x < -20 || p.x > r.width + 20 || p.y < -20 || p.y > r.height + 20) {
                        p.el.remove();
                        projectiles.splice(i, 1);
                    }
                }

                requestAnimationFrame(tick);
            }

            arena.addEventListener('mousedown', function (e) {
                if (e.button !== 0) return;
                e.preventDefault();
                const r = arenaRect();
                const mx = e.clientX - r.left;
                const my = e.clientY - r.top;
                const { w, h } = getLogoSize();
                const cx = x + w / 2;
                const cy = y + h / 2;
                const dx = mx - cx;
                const dy = my - cy;
                const len = Math.hypot(dx, dy) || 1;
                const pvx = (dx / len) * projectileSpeed;
                const pvy = (dy / len) * projectileSpeed;
                const el = document.createElement('div');
                el.className = 'projectile';
                projectilesEl.appendChild(el);
                projectiles.push({ x: cx - 5, y: cy - 5, vx: pvx, vy: pvy, el: el });
                if (shootSnd.src) {
                    shootSnd.currentTime = 0;
                    shootSnd.play().catch(function () {});
                }
            });

            // --- Dragging: mousemove and mouseup commented out ---
            // window.addEventListener('mousemove', function (e) {
            //     if (!isDragging) return;
            //     ...
            // });
            // window.addEventListener('mouseup', function (e) {
            //     if (!isDragging) return;
            //     ...
            // });

            window.addEventListener('keydown', function (e) {
                const k = e.key.toLowerCase();
                if (k === 'w' || k === 'a' || k === 's' || k === 'd') e.preventDefault();
                if (k === 'w') keys.w = true;
                if (k === 'a') keys.a = true;
                if (k === 's') keys.s = true;
                if (k === 'd') keys.d = true;
            });
            window.addEventListener('keyup', function (e) {
                const k = e.key.toLowerCase();
                if (k === 'w') keys.w = false;
                if (k === 'a') keys.a = false;
                if (k === 's') keys.s = false;
                if (k === 'd') keys.d = false;
            });

            window.addEventListener('resize', function () {
                const r = arenaRect();
                const { w, h } = getLogoSize();
                const pad = 2;
                const maxX = Math.max(0, r.width - w - pad);
                const maxY = Math.max(0, r.height - h - pad);
                x = Math.max(pad, Math.min(maxX, x));
                y = Math.max(pad, Math.min(maxY, y));
                setPosition(x, y);
            });

            logo.addEventListener('dragstart', function (e) {
                e.preventDefault();
            });

            if (logo.complete && logo.naturalWidth) {
                initPosition();
            } else {
                logo.addEventListener('load', initPosition);
            }
            requestAnimationFrame(tick);
        })();
    </script>
</body>

</html>
